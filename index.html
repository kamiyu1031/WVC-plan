                mq.parentNode.replaceChild(div, mq);
              });
              
              // 確保所有被設定為 truncate 的標籤都有足夠行高
              const truncates = clonedDoc.querySelectorAll('.truncate');
              truncates.forEach(t => {
                t.style.lineHeight = '1.4';
                t.style.paddingBottom = '2px';
              });
            }
          });

          const { jsPDF } = window.jspdf;
          // A4 直向 (Portrait): 210mm x 297mm
          const pdf = new jsPDF({ orientation: 'portrait', unit: 'mm', format: 'a4' });
          const pageW = 190; // 內容寬度 (210-左右邊距 10x2)
          const pageH = 277; // 內容高度 (297-上下邊距 10x2)

          const imgW = canvas.width;
          const imgH = canvas.height;
          // 計算縮放比例以符合直式頁面，並維持置中
          const ratio = Math.min(pageW / imgW, pageH / imgH);
          const finalW = imgW * ratio;
          const finalH = imgH * ratio;
          
          // 計算水平置中與垂直置中的偏移量
          const offsetX = (210 - finalW) / 2;
          const offsetY = (297 - finalH) / 2;

          // 使用 JPEG 格式並設定 0.85 壓縮率大幅降低檔案大小
          const imgData = canvas.toDataURL('image/jpeg', 0.85);
          pdf.addImage(imgData, 'JPEG', offsetX, offsetY, finalW, finalH, undefined, 'FAST');
          pdf.save(`排班表_${currentYear}年${currentMonth + 1}月.pdf`);

          document.getElementById('pdf-loading')?.remove();
        } catch (err) {
          console.error(err);
          document.getElementById('pdf-loading')?.remove();
          alert('PDF 匯出失敗，請確認網路連線以載入所需套件。');
        }
      };

      // 處理 Excel 匯入 (同時讀取「工班清單」和「狀態」兩張工作表)
      const handleExcelUpload = (e) => {
        const file = e.target.files[0];
        if (!file) return;

        const reader = new FileReader();
        reader.onload = (evt) => {
          try {
            const bstr = evt.target.result;
            const wb = XLSX.read(bstr, { type: 'binary' });

            // === 解析「工班清單」工作表 ===
            const workerSheetName = wb.SheetNames.find(n => n.includes('工班') || (n.includes('清單') && !n.includes('車輛'))) || wb.SheetNames[0];
            const ws = wb.Sheets[workerSheetName];
            const data = XLSX.utils.sheet_to_json(ws, { header: 1 });

            const newWorkers = [];
            for (let i = 1; i < data.length; i++) {
              const row = data[i];
              if (!row || row.length === 0) continue;
              const idVal = row[0];
              const nameVal = row[1];
              const shortVal = row[2];
              const vehicleVal = row[3];
              let nameStr = (nameVal === undefined || nameVal === null || String(nameVal).trim() === '' || String(nameVal).trim() === '0') ? '0' : String(nameVal).trim();
              let shortStr = (shortVal === undefined || shortVal === null) ? String(idVal || '') : String(shortVal).trim();
              let vehicleStr = (vehicleVal === undefined || vehicleVal === null) ? '' : String(vehicleVal).trim();
              newWorkers.push({ id: idVal || i, name: nameStr, short: shortStr, vehicle: vehicleStr });
            }
            if (newWorkers.length > 0) {
              const targetDate = formatDateString(new Date().getFullYear(), new Date().getMonth(), new Date().getDate());
              setWorkersHistory(prev => {
                const newHistory = { ...prev };
                newHistory[targetDate] = newWorkers;
                Object.keys(newHistory).forEach(key => {
                  if (key > targetDate) delete newHistory[key];
                });
                return newHistory;
              });
            }

            // === 解析「車輛清單」工作表 ===
            const vehicleSheetName = wb.SheetNames.find(n => n.includes('車輛清單') || n === '車輛清單');
            if (vehicleSheetName) {
              const vws = wb.Sheets[vehicleSheetName];
              const vData = XLSX.utils.sheet_to_json(vws, { header: 1 });
              setVehicleList(vData);
            }

            // === 解析「狀態」工作表 ===
            const statusSheetName = wb.SheetNames.find(n => n.includes('狀態'));
            if (statusSheetName) {
              const sws = wb.Sheets[statusSheetName];
              const sData = XLSX.utils.sheet_to_json(sws, { header: 1 });

              // 解析狀態，花形舊名對照表
              const colorNameMap = {
                '淺綠色': '#A9D18E', '深綠色': '#70AD47', '墨綠色': '#4D7731',
                '藍色': '#00B0F0', '灰色': '#BFBFBF', '白色': '#FFFFFF',
                '粉紅色': '#F4B8C1', '紫色': '#CC00FF', '紅色': '#FF0000',
                '黑色': '#333333', '橙色': '#FF8C00', '黃色': '#FFD700',
                '深藍色': '#002060',
              };
              // 過濾掉標題列
              const newStatuses = {};
              for (let i = 1; i < sData.length; i++) {
                const row = sData[i];
                if (!row || !row[0]) continue;
                const label = String(row[0]).trim();
                const colorLabel = row[1] ? String(row[1]).trim() : '綠色';
                const borderLabel = row[2] ? String(row[2]).trim() : '無';
                const borderColorLabel = row[3] ? String(row[3]).trim() : '無';

                const bg = colorNameMap[colorLabel] || '#A9D18E';
                let borderStyle = 'none';
                if (borderLabel === '實線') borderStyle = 'solid';
                else if (borderLabel === '虛線') borderStyle = 'dashed';
                let borderColor = 'transparent';
                if (borderColorLabel && borderColorLabel !== '無') {
                  borderColor = colorNameMap[borderColorLabel] || borderColorLabel;
                } else if (borderStyle === 'solid') {
                  borderColor = bg; // 預設同底色
                }

                // 自動決定文字顏色
                const darkBgs = ['#FFFFFF', '#BFBFBF', '#A9D18E', '#F4B8C1', '#FFD700'];
                const textColor = darkBgs.includes(bg) ? '#333333' : '#ffffff';

                const key = 'status_' + i;
                newStatuses[key] = { label, bg, borderStyle, borderColor, textColor };
              }
              if (Object.keys(newStatuses).length > 0) {
                // 將「未派」移到最前面作為預設狀態
                const reordered = {};
                const unassignKey = Object.keys(newStatuses).find(k => newStatuses[k].label === '未派');
                if (unassignKey) {
                  reordered[unassignKey] = newStatuses[unassignKey];
                }
                Object.keys(newStatuses).forEach(k => {
                  if (k !== unassignKey) reordered[k] = newStatuses[k];
                });
                setStatusTypes(reordered);
              }
            }

            alert('名單與狀態已成功從 Excel 匯入並更新！');
          } catch (error) {
            console.error(error);
            alert('解析 Excel 時發生錯誤。請確認網路連線以載入解析套件，或檢查檔案格式。');
          }
        };
        reader.readAsBinaryString(file);
      };

      // 處理任務清單 Excel 匯入
      const handleMissionExcelUpload = (e) => {
        const file = e.target.files[0];
        if (!file) return;

        const reader = new FileReader();
        reader.onload = (evt) => {
          try {
            const bstr = evt.target.result;
            const wb = XLSX.read(bstr, { type: 'binary' });

            // Sheet 1: 任務清單
            const wsTaskName = wb.SheetNames.find(n => n.includes('任務')) || wb.SheetNames[0];
            if (wsTaskName) {
              const wsTask = wb.Sheets[wsTaskName];
              const taskData = XLSX.utils.sheet_to_json(wsTask);
              if (taskData.length > 0) {
                setMissionConfig(taskData);
              }
            }

            // Sheet 2: 代辦工作列表
            const wsUnfinishedName = wb.SheetNames.find(n => n.includes('代辦'));
            if (wsUnfinishedName) {
              const wsUnfinished = wb.Sheets[wsUnfinishedName];
              const unfinishedData = XLSX.utils.sheet_to_json(wsUnfinished);
              const mappedUnfinished = unfinishedData.map(d => ({
                loc: (d['地址'] || d['地址'] === 0) ? String(d['地址']).trim() : '',
                remark: (d['備註'] || d['備註'] === 0) ? String(d['備註']).trim() : ''
              })).filter(d => d.loc);
              if (mappedUnfinished.length > 0) {
                setUnfinishedTasks(mappedUnfinished);
              }
            }

            // Sheet 3: 車輛配置組別
            const wsVehicleName = wb.SheetNames.find(n => n.includes('車輛') || n.includes('組別'));
            if (wsVehicleName) {
              const wsVehicle = wb.Sheets[wsVehicleName];
              const vehicleData = XLSX.utils.sheet_to_json(wsVehicle);
              const mappedVehicles = vehicleData.map(d => {
                const val = d['車輛組別'] || d['車輛配置組別'] || d[Object.keys(d)[0]];
                return (val || val === 0) ? String(val).trim() : '';
              }).filter(v => v);
              if (mappedVehicles.length > 0) {
                setWizardVehicles(mappedVehicles);
              }
            }

            alert(`成功匯入任務清單相關設定！`);
          } catch (error) {
            console.error(error);
            alert('解析任務清單發生錯誤。');
          }
        };
        reader.readAsBinaryString(file);
        e.target.value = '';
      };

      // 匯出任務清單
      const handleExportMissionExcel = () => {
        const wb = XLSX.utils.book_new();

        // 1. 任務清單
        const wsTask = XLSX.utils.json_to_sheet(missionConfig.length > 0 ? missionConfig : [{ "業主": "", "標案": "", "區域": "", "地址": "" }]);
        XLSX.utils.book_append_sheet(wb, wsTask, "任務清單");

        // 2. 代辦工作列表
        const arrUnfinished = unfinishedTasks.length > 0 ? unfinishedTasks.map(t => ({ 地址: t.loc, 備註: t.remark || '' })) : [{ 地址: "", 備註: "" }];
        const wsUnfinished = XLSX.utils.json_to_sheet(arrUnfinished);
        XLSX.utils.book_append_sheet(wb, wsUnfinished, "代辦工作列表");

        // 3. 車輛配置組別
        const arrVehicles = wizardVehicles.length > 0 ? wizardVehicles.map(v => ({ 車輛組別: v })) : [{ 車輛組別: "" }];
        const wsVehicles = XLSX.utils.json_to_sheet(arrVehicles);
        XLSX.utils.book_append_sheet(wb, wsVehicles, "車輛配置組別");

        const yyyy = new Date().getFullYear();
        const mm = String(new Date().getMonth() + 1).padStart(2, '0');
        const dd = String(new Date().getDate()).padStart(2, '0');
        XLSX.writeFile(wb, `任務清單預設項目_${yyyy}${mm}${dd}.xlsx`);
      };

      // 匯出當月現有排班、任務與派工為 Excel
      const handleExportWorkOrder = () => {
        const exportData = [];

        for (let day = 1; day <= daysInMonth; day++) {
          const dateStr = formatDateString(currentYear, currentMonth, day);
          const dailyShifts = shifts[dateStr] || {};
          const dailyTasks = tasks[dateStr] || [];
          const dailyMaterials = materials[dateStr] || [];
          const times = shiftTimes[dateStr] || {};

          const hasWorkers = Object.keys(dailyShifts).length > 0;
          const hasTasks = dailyTasks.length > 0;
          const hasMaterials = dailyMaterials.length > 0;

          if (!hasWorkers && !hasTasks && !hasMaterials) continue; // 沒排任何東西的日期就跳過

          const dailyWorkersList = getWorkersForDate(workersHistory, dateStr);
          const activeWorkers = dailyWorkersList.filter(w => w.name !== '0' && !w.hidden);
          
          let morningWorkers = [];
          let eveningWorkers = [];
          
          const presentKeys = ['morning', 'evening', 'double', 'block'];
          
          activeWorkers.forEach(w => {
            const st = dailyShifts[w.name] || Object.keys(statusTypes)[0];
            const info = statusTypes[st];
            if (!info) return;

            const lbl = info.label || '';
            const presentLabels = ['早班', '晚班', '連班', '擋班'];
            
            if (presentKeys.includes(st) || presentLabels.includes(lbl)) {
              const isMorning = lbl.includes('早班') || lbl.includes('連班') || st === 'morning' || st === 'double';
              const isEvening = lbl.includes('晚班') || lbl.includes('連班') || st === 'evening' || st === 'double';
              
              const shortNameAndVehicle = w.vehicle ? `${w.short}[${w.vehicle}]` : w.short;
              
              if (isMorning) morningWorkers.push(shortNameAndVehicle);
              if (isEvening) eveningWorkers.push(shortNameAndVehicle);
              if (!isMorning && !isEvening) morningWorkers.push(shortNameAndVehicle); // 如果無法判斷，預設放早班
            }
          });

          // 整理當日用料字串
          const matTexts = dailyMaterials.map((m, idx) => {
             return `${idx + 1}. ${m.tool} ${m.rawMaterial} ${m.quantity}`.trim();
          }).join('\n');

          const baseRow = {
            '日期': `${currentMonth + 1}月${day}日`,
            '星期': weekDays[(new Date(currentYear, currentMonth, day).getDay() + 6) % 7],
            '早班時間': times.morning || '',
            '早班人員': morningWorkers.join('、'),
            '晚班時間': times.evening || '',
            '晚班人員': eveningWorkers.join('、'),
            '使用料件': matTexts
          };

          if (dailyTasks.length > 0) {
            // 如果有任務，每個任務獨立一列
            dailyTasks.forEach((t, idx) => {
               exportData.push({
                 ...baseRow,
                 '任務編號': idx + 1,
                 '車輛': t.vehicle || '',
                 '業主': t.owner || '',
                 '標案': t.project || '',
                 '區域': t.region || '',
                 '地址': t.address || '',
                 '備註': t.remarks || ''
               });
               // 為了排版清楚，只有第一個任務行會顯示人員和用料，其餘留空 (這步可選，如果希望每行都有人員資訊就不要清空)
               baseRow['早班時間'] = '';
               baseRow['早班人員'] = '';
               baseRow['晚班時間'] = '';
               baseRow['晚班人員'] = '';
               baseRow['使用料件'] = '';
            });
          } else {
            // 如果沒有任務，只印人員和用料
            exportData.push({
               ...baseRow,
               '任務編號': '',
               '車輛': '',
               '業主': '',
               '標案': '',
               '區域': '',
               '地址': '',
               '備註': ''
            });
          }
        }

        if (exportData.length === 0) {
          alert('本月尚無任何排班與任務資料可匯出！');
          return;
        }

        const wb = XLSX.utils.book_new();
        const ws = XLSX.utils.json_to_sheet(exportData);
        XLSX.utils.book_append_sheet(wb, ws, "月派工單");

        const yyyy = currentYear;
        const mm = String(currentMonth + 1).padStart(2, '0');
        XLSX.writeFile(wb, `派工單排班紀錄_${yyyy}${mm}.xlsx`);
      };

      // 處理派工單匯入 (260309整理後派工單.xlsx 格式)
      const handleWorkOrderUpload = (e) => {
        const file = e.target.files[0];
        if (!file) return;

        const reader = new FileReader();
        reader.onload = (evt) => {
          try {
            const bstr = evt.target.result;
            const wb = XLSX.read(bstr, { type: 'binary' });
            const ws = wb.Sheets[wb.SheetNames[0]];
            const data = XLSX.utils.sheet_to_json(ws, { raw: false, defval: '' }); // raw:false 保證時間等為字串

            if (data.length > 0) {
              const newTasks = { ...tasks };
              const newMaterials = { ...materials };
              const newUnfinished = [];
              const seenUnfinished = new Set();

              data.forEach(row => {
                const dateStrOriginal = String(row['日期'] || '').trim();
                const match = dateStrOriginal.match(/(\d+)月(\d+)日/);
                if (!match) return;

                const m = parseInt(match[1], 10) - 1;
                const d = parseInt(match[2], 10);
                const targetDate = formatDateString(currentYear, m, d);

                const shiftName = String(row['班別'] || '').trim();
                const shiftType = (shiftName === '夜班' || shiftName === '晚班') ? '晚班' : '早班';

                const time = String(row['上班時間'] || '').trim();
                const owner = String(row['業主'] || '').trim();
                const location = String(row['地點'] || '').trim();
                const remarks = String(row['用料/備註'] || '').trim();

                // 收集為待辦任務清單項目
                if (location) {
                  const uKey = location + "|||" + remarks;
                  if (!seenUnfinished.has(uKey)) {
                    seenUnfinished.add(uKey);
                    newUnfinished.push({ loc: location, remark: remarks });
                  }
                }

                // 新增任務 (地點對應確切地址/路段)
                if (location || owner || time) {
                  if (!newTasks[targetDate]) newTasks[targetDate] = [];
                  newTasks[targetDate].push({
                    owner: owner,
                    project: '',
                    city: '',
                    region: shiftType,
                    address: location,
                    remarks: time, // 把上班時間先寫進remarks
                    vehicle: '',
                    customOwner: true, customProject: true
                  });
                }

                // 新增使用料件 (用料對應)
                if (remarks) {
                  if (!newMaterials[targetDate]) newMaterials[targetDate] = [];
                  newMaterials[targetDate].push({
                    tool: remarks,
                    rawMaterial: '',
                    quantity: ''
                  });
                }
              });

              setTasks(newTasks);
              setMaterials(newMaterials);
              if (newUnfinished.length > 0) {
                setUnfinishedTasks(prev => {
                  const merged = [...prev];
                  newUnfinished.forEach(nu => {
                    if (!merged.find(m => m.loc === nu.loc && m.remark === nu.remark)) {
                      merged.push(nu);
                    }
                  });
                  return merged;
                });
              }
              alert(`成功匯入派工單並轉換為排班項目！`);
            } else {
              alert('未能在該檔案中找到任何有效資料。');
            }
          } catch (error) {
            console.error(error);
            alert('解析派工單發生錯誤。請確認檔案格式是否為「整理後派工單」。');
          }
        };
        reader.readAsBinaryString(file);
        e.target.value = '';
      };

      // 產生空白格子
      const emptyCells = Array.from({ length: firstDayIndex }).map((_, i) => (
        <div key={`empty-${i}`} className="bg-gray-50/50 border border-gray-100 min-h-[120px] sm:min-h-[140px]"></div>
      ));

      // 產生日期格子
      const dayCells = Array.from({ length: daysInMonth }).map((_, i) => {
        const day = i + 1;
        const dateStr = formatDateString(currentYear, currentMonth, day);
        const dailyShifts = shifts[dateStr] || {};
        const holidayName = HOLIDAYS[dateStr];
        const lunarStr = getLunarDateStr(currentYear, currentMonth, day);

        const dayOfWeekIndex = (firstDayIndex + i) % 7;
        const isWeekend = dayOfWeekIndex === 5 || dayOfWeekIndex === 6;

        const cellDate = new Date(currentYear, currentMonth, day);
        const isToday = new Date().toDateString() === cellDate.toDateString();
        const todayStart = new Date();
        todayStart.setHours(0, 0, 0, 0);
        const isPast = cellDate < todayStart;

        const dailyWorkersList = getWorkersForDate(workersHistory, dateStr);

        // 計算出勤與未出勤統計
        const presentKeys = ['morning', 'evening', 'double', 'block'];
        const absentKeys = ['dayoff', 'unassign', 'personal', 'sick', 'awol', 'injury', 'funeral', 'paternity'];
        let activeWorkers = dailyWorkersList.filter(w => w.name !== '0' && !w.hidden);
        
        // --- 依車輛 (vehicle) 排序，有車號的前面依車號排，沒有的排後面 ---
        activeWorkers.sort((a, b) => {
          const vA = a.vehicle ? String(a.vehicle).trim() : 'ZZZ';
          const vB = b.vehicle ? String(b.vehicle).trim() : 'ZZZ';
          if (vA === vB) return a.id - b.id;
          return vA.localeCompare(vB);
        });

        const totalWorkers = activeWorkers.length;

        // 統計每位工人的狀態
        let presentCount = 0;
        let absentCount = 0;
        activeWorkers.forEach(w => {
          const st = dailyShifts[w.name] || Object.keys(statusTypes)[0];
          // 嘗試用 label 比對分類
          const info = statusTypes[st];
          const lbl = info ? info.label : '';
          const presentLabels = ['早班', '晚班', '連班', '擋班'];
          if (presentKeys.includes(st) || presentLabels.includes(lbl)) {
            presentCount++;
          } else {
            absentCount++;
          }
        });

        return (
          <div
            key={`day-${day}`}
            onClick={() => handleDayClick(day)}
            className={`relative p-1 border min-h-[100px] sm:min-h-[120px] flex flex-col cursor-pointer transition-all hover:border-blue-400 hover:shadow-md
          ${isWeekend || holidayName ? 'bg-red-50/30' : 'bg-white'} 
          ${isToday ? 'ring-2 ring-blue-500 ring-inset' : 'border-gray-200'}
        `}
          >
            {/* 頂部：日期、農曆與假日資訊 */}
            <div className="flex justify-between items-start mb-0.5">
              <span className={`flex items-center justify-center w-7 h-7 rounded-full text-base font-bold
            ${isToday ? 'bg-blue-600 text-white' : 'text-gray-800'}
            ${(isWeekend || holidayName) && !isToday ? 'text-red-600' : ''}
          `}>
                {day}
              </span>

              <div className="flex flex-col items-end text-xs">
                {holidayName ? (
                  <span className="text-red-600 font-bold bg-red-100 px-1.5 py-0.5 rounded shadow-sm">{holidayName}</span>
                ) : (
                  <span className="text-gray-400">{lunarStr}</span>
                )}
              </div>
            </div>

            {/* 出勤/未出勤統計已移至排班 Modal */}

            {/* 內容區塊：人員、任務、料件 */}
            <div className="mt-1 w-full flex flex-col gap-0.5 flex-1">
              {/* 人員 */}
              <div className="bg-slate-50 rounded-sm px-1 py-0.5 text-[10px] sm:text-[11px] leading-tight text-slate-700 border border-slate-200/60 shrink-0">
                <div className="font-bold border-b border-slate-200/60 mb-0.5 pb-px flex items-center gap-1">
                  <span className="w-1.5 h-1.5 rounded-full bg-slate-400"></span>人員
                </div>
                <div className="flex flex-col gap-[3px] mt-px">
                  {Object.entries(activeWorkers.reduce((acc, worker) => {
                    const v = worker.vehicle ? String(worker.vehicle).trim() : '';
                    if (!acc[v]) acc[v] = [];
                    acc[v].push(worker);
                    return acc;
                  }, {})).sort((a, b) => {
                    if (a[0] === '' && b[0] !== '') return 1;
                    if (a[0] !== '' && b[0] === '') return -1;
                    return a[0].localeCompare(b[0]);

                  <button 
                    onClick={() => {
                      // 檢查防呆: 是否有其他重複的形式
                      const dup = Object.entries(statusTypes).find(([k, v]) => {
                         if (k === editingStatusKey) return false;
                         return v.bg === editingStatusForm.bg && 
                                v.textColor === editingStatusForm.textColor && 
                                v.borderStyle === editingStatusForm.borderStyle && 
                                (editingStatusForm.borderStyle === 'none' || v.borderColor === editingStatusForm.borderColor);
                      });
                      if (dup) {
                         alert(`此顏色與外框的組合已與「${dup[1].label}」重複（形式不可完全相同），請重新調整參數！`);
                         return;
                      }
                      setStatusTypes(prev => ({...prev, [editingStatusKey]: editingStatusForm}));
                      setEditingStatusKey(null);
                    }} 
                    className="px-4 py-2 bg-teal-600 rounded-lg text-sm font-bold text-white hover:bg-teal-700 transition-colors shadow-sm"
                  >
                    儲存變更
                  </button>
                </div>
              </div>
            </div>
          )}

          </div>
        </React.Fragment>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>

</html>
