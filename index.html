        };
      }, [currentDate]);

      // 格式化日期為 YYYY-MM-DD
      const formatDateString = (year, month, day) => {
        return `${year}-${String(month + 1).padStart(2, '0')}-${String(day).padStart(2, '0')}`;
      };

      // 取得農曆日期字串 (使用瀏覽器內建 Intl API)
      const getLunarDateStr = (year, month, day) => {
        try {
          const date = new Date(year, month, day);
          const formatter = new Intl.DateTimeFormat('zh-TW-u-ca-chinese', { month: 'short', day: 'numeric' });
          let lunarStr = formatter.format(date);
          // 移除多餘字眼，只保留如 "正月十五" 或 "二月初一"
          return lunarStr.replace(/農曆|年/g, '').trim();
        } catch (e) {
          return ''; // 若瀏覽器不支援則回傳空
        }
      };

      const handlePrevMonth = () => setCurrentDate(new Date(currentYear, currentMonth - 1, 1));
      const handleNextMonth = () => setCurrentDate(new Date(currentYear, currentMonth + 1, 1));

      // 處理點擊單一日期開啟排班面板
      const handleDayClick = (day) => {
        const dateStr = formatDateString(currentYear, currentMonth, day);
        setSelectedDateStr(dateStr);
      };

      // 變更排班狀態
      const handleStatusChange = (worker, newStatus) => {
        setShifts(prev => {
          const dailyData = { ...(prev[selectedDateStr] || {}) };
          if (newStatus === 'normal') {
            delete dailyData[worker];
          } else {
            dailyData[worker] = newStatus;
          }
          return { ...prev, [selectedDateStr]: dailyData };
        });
      };

      // === 任務與料件管理 ===
      const handleAddTask = () => {
        setWizardData({ owner: '', project: '', city: '', region: '', address: '', remarks: '', customOwner: false, customProject: false });
        setWizardStep(1);
        setShowUnfinishedTasks(false);
        setShowTaskWizard(true);
      };

      const handleAddUnfinishedTask = (taskDesc) => {
        setTasks(prev => {
          const daily = prev[selectedDateStr] ? [...prev[selectedDateStr]] : [];
          daily.push({
            id: Date.now(),
            owner: '',
            project: '',
            region: '',
            address: taskDesc,
            remarks: '未完工作'
          });
          return { ...prev, [selectedDateStr]: daily };
        });
      };

      const submitTaskWizard = () => {
        setTasks(prev => {
          const daily = prev[selectedDateStr] ? [...prev[selectedDateStr]] : [];
          daily.push({
            id: Date.now(),
            owner: wizardData.owner,
            project: wizardData.project,
            region: (wizardData.city + wizardData.region).trim(),
            address: wizardData.address,
            remarks: wizardData.remarks
          });
          return { ...prev, [selectedDateStr]: daily };
        });
        setShowTaskWizard(false);
      };

      const handleUpdateTask = (id, field, value) => {
        setTasks(prev => {
          const daily = (prev[selectedDateStr] || []).map(t => t.id === id ? { ...t, [field]: value } : t);
          return { ...prev, [selectedDateStr]: daily };
        });
      };
      const handleRemoveTask = (id) => {
        setTasks(prev => {
          const daily = (prev[selectedDateStr] || []).filter(t => t.id !== id);
          return { ...prev, [selectedDateStr]: daily };
        });
      };

      const handleAddMaterial = () => {
        setMaterials(prev => {
          const daily = prev[selectedDateStr] ? [...prev[selectedDateStr]] : [];
          daily.push({ id: Date.now(), tool: '', rawMaterial: '', quantity: '' });
          return { ...prev, [selectedDateStr]: daily };
        });
      };
      const handleUpdateMaterial = (id, field, value) => {
        setMaterials(prev => {
          const daily = (prev[selectedDateStr] || []).map(m => m.id === id ? { ...m, [field]: value } : m);
          return { ...prev, [selectedDateStr]: daily };
        });
      };
      const handleRemoveMaterial = (id) => {
        setMaterials(prev => {
          const daily = (prev[selectedDateStr] || []).filter(m => m.id !== id);
          return { ...prev, [selectedDateStr]: daily };
        });
      };

      // 全天重設為「未派」
      const handleResetAllToUnassign = () => {
        if (!selectedDateStr) return;
        setShifts(prev => {
          const copy = { ...prev };
          delete copy[selectedDateStr];
          return copy;
        });
      };

      // 全天重設為「擋班」
      const handleResetAllToBlock = () => {
        if (!selectedDateStr) return;
        const blockKey = Object.keys(statusTypes).find(k => k === 'block' || statusTypes[k].label === '擋班') || 'block';
        setShifts(prev => {
          const dailyData = {};
          workersList.forEach(w => {
            if (w.name !== '0') {
              dailyData[w.name] = blockKey;
            }
          });
          return { ...prev, [selectedDateStr]: dailyData };
        });
      };

      // 計算目前選取日期的出勤統計 (用於排班 Modal)
      let modalPresentCount = 0;
      let modalAbsentCount = 0;
      if (selectedDateStr) {
        const dailyShifts = shifts[selectedDateStr] || {};
        const presentKeys = ['morning', 'evening', 'double', 'block'];
        const activeWorkers = workersList.filter(w => w.name !== '0');
        activeWorkers.forEach(w => {
          const st = dailyShifts[w.name] || Object.keys(statusTypes)[0];
          const info = statusTypes[st];
          const lbl = info ? info.label : '';
          const presentLabels = ['早班', '晚班', '連班', '擋班'];
          if (presentKeys.includes(st) || presentLabels.includes(lbl)) {
            modalPresentCount++;
          } else {
            modalAbsentCount++;
          }
        });
      }

      // === 複製該日排班文字格式 ===
      const handleCopySchedule = () => {
        if (!selectedDateStr) return;
        const dateParts = selectedDateStr.split('-');
        const m = parseInt(dateParts[1], 10);
        const d = parseInt(dateParts[2], 10);
        const dateLine = `${m}/${d}`;

        const times = shiftTimes[selectedDateStr] || {};
        const dailyShifts = shifts[selectedDateStr] || {};

        const morningWorkers = [];
        const eveningWorkers = [];
        Object.keys(dailyShifts).forEach(workerKey => {
          const workerStatusKey = dailyShifts[workerKey];
          const statusInfo = statusTypes[workerStatusKey];
          if (!statusInfo) return;

          const label = statusInfo.label || '';
          const isMorning = label.includes('早班') || label.includes('連班') || workerStatusKey === 'morning' || workerStatusKey === 'double';
          const isEvening = label.includes('晚班') || label.includes('連班') || workerStatusKey === 'evening' || workerStatusKey === 'double';

          if (isMorning) morningWorkers.push(workerKey);
          if (isEvening) eveningWorkers.push(workerKey);
        });

        const getShortName = (fullName) => {
          const match = workersList.find(w => w.name === fullName || `工班員 ${w.id}` === fullName);
          return match ? match.short : fullName;
        };

        let resultMsg = "";
        if (morningWorkers.length > 0) {
          const timeStr = times.morning || "08:00";
          resultMsg += `${dateLine}\n早上${timeStr}\n${morningWorkers.map(getShortName).join('.')}\n`;
        }

        if (eveningWorkers.length > 0) {
          if (resultMsg !== "") resultMsg += "\n";
          const timeStr = times.evening || "20:00";
          resultMsg += `${dateLine}\n晚上${timeStr}\n${eveningWorkers.map(getShortName).join('.')}\n`;
        }

        if (resultMsg === "") {
          alert("今日無排班紀錄可複製");
          return;
        }

        navigator.clipboard.writeText(resultMsg).then(() => {
          alert("已成功複製班表！\n\n" + resultMsg);
        }).catch(err => {
          console.error('複製失敗', err);
          alert("複製失敗，請檢查瀏覽器權限或手動反白複製");
        });
      };

      // === 儲存排班資料為 JSON 檔案 ===
      const handleSave = () => {
        const saveData = {
          version: 1,
          savedAt: new Date().toISOString(),
          currentMonth: `${currentYear}-${String(currentMonth + 1).padStart(2, '0')}`,
          workers: workersList,
          statuses: statusTypes,
          shifts: shifts,
          shiftTimes: shiftTimes,
          tasks: tasks,
          materials: materials,
          missionConfig: missionConfig,
        };
        const blob = new Blob([JSON.stringify(saveData, null, 2)], { type: 'application/json' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `排班表_${saveData.currentMonth}.json`;
        a.click();
        URL.revokeObjectURL(url);
        alert('排班資料已儲存！');
      };

      // === 讀取排班資料 JSON 檔案 ===
      const handleLoad = (e) => {
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = (evt) => {
          try {
            const data = JSON.parse(evt.target.result);
            if (data.workers) setWorkersList(data.workers);
            if (data.statuses) setStatusTypes(data.statuses);
            if (data.shifts) setShifts(data.shifts);
            if (data.shiftTimes) setShiftTimes(data.shiftTimes);
            if (data.tasks) setTasks(data.tasks);
            if (data.materials) setMaterials(data.materials);
            if (data.missionConfig) setMissionConfig(data.missionConfig);
            if (data.currentMonth) {
              const parts = data.currentMonth.split('-');
              setCurrentDate(new Date(parseInt(parts[0]), parseInt(parts[1]) - 1, 1));
            }
            alert('排班資料已成功讀取！');
          } catch (err) {
            console.error(err);
            alert('讀取失敗，請確認檔案格式正確。');
          }
        };
        reader.readAsText(file);
        e.target.value = ''; // 重設以便再次選取同一檔案
      };

      // === 文字輸入排班處理 ===
      const handleTextInputSchedule = () => {
        const text = textInputValue.trim();
        if (!text) {
          setTextInputResult({ type: 'error', message: '請輸入排班內容。' });
          return;
        }

        const lines = text.split('\n').map(l => l.trim()).filter(l => l.length > 0);
        if (lines.length < 3) {
          setTextInputResult({ type: 'error', message: '格式不正確，至少需要三行：日期、時間、人員簡稱。' });
          return;
        }

        // 第一行：解析日期 (支援 M/D 或 MM/DD 格式)
        const dateLine = lines[0];
        const dateMatch = dateLine.match(/(\d{1,2})\/(\d{1,2})/);
        if (!dateMatch) {
          setTextInputResult({ type: 'error', message: `無法解析日期："${dateLine}"，請用 M/D 格式 (如 3/4)。` });
          return;
        }
        const inputMonth = parseInt(dateMatch[1]);
        const inputDay = parseInt(dateMatch[2]);
        const targetYear = currentYear;
        // 驗證日期有效性
        const testDate = new Date(targetYear, inputMonth - 1, inputDay);
        if (testDate.getMonth() !== inputMonth - 1 || testDate.getDate() !== inputDay) {
          setTextInputResult({ type: 'error', message: `日期無效：${inputMonth}/${inputDay}` });
          return;
        }
        const targetDateStr = formatDateString(targetYear, inputMonth - 1, inputDay);

        // 第二行：解析時間判斷早班/晚班
        const timeLine = lines[1];
        let shiftType = 'evening'; // 預設晚班
        // 判斷早班條件：包含「上午」、「早上」、「早班」、「AM」，或時間小時 < 12
        const morningKeywords = /上午|早上|早班|am/i;
        if (morningKeywords.test(timeLine)) {
          shiftType = 'morning';
        } else {
          // 嘗試解析時間中的小時數
          const timeMatch = timeLine.match(/(\d{1,2})\s*[:：]\s*(\d{1,2})/);
          if (timeMatch) {
            const hour = parseInt(timeMatch[1]);
            if (hour < 12) {
              shiftType = 'morning';
            }
          }
        }

        // 找到對應的狀態 key (morning / evening)
        let statusKey = shiftType;
        // 如果 statusTypes 使用自訂 key (如 status_1)，需要用 label 查找
        if (!statusTypes[statusKey]) {
          const targetLabel = shiftType === 'morning' ? '早班' : '晚班';
          const found = Object.entries(statusTypes).find(([k, v]) => v.label === targetLabel);
          if (found) statusKey = found[0];
        }

        // 第三行：解析人員簡稱 (以 . 分隔)
        const namesLine = lines[2];
        const shortNames = namesLine.split('.').map(n => n.trim()).filter(n => n.length > 0);

        if (shortNames.length === 0) {
          setTextInputResult({ type: 'error', message: '未偵測到任何人員簡稱。' });
          return;
        }

        // 匹配人員
        const matched = [];
        const unmatched = [];
        const newDailyData = { ...(shifts[targetDateStr] || {}) };

        // 找出名稱以「點-」開頭的工班人員
        const dotWorkers = workersList.filter(w => w.name.startsWith('點-'));
        let dotWorkerIndex = 0;

        shortNames.forEach(shortName => {
          // 在 workersList 中尋找匹配的 short
          const worker = workersList.find(w => w.short === shortName && w.name !== '0');
          if (worker) {
            newDailyData[worker.name] = statusKey;
            matched.push(`${worker.name}(${shortName})`);
          } else {
            // 查無對應簡稱，分配到「點-」人員
            if (dotWorkerIndex < dotWorkers.length) {
              const dotWorker = dotWorkers[dotWorkerIndex];
              newDailyData[dotWorker.name] = statusKey;
              matched.push(`${dotWorker.name} ← 代替 "${shortName}"`);
              dotWorkerIndex++;
            } else {
              unmatched.push(shortName);
            }
          }
        });

        // 更新 shifts
        setShifts(prev => ({
          ...prev,
          [targetDateStr]: newDailyData,
        }));

        // 產生結果訊息
        const shiftLabel = shiftType === 'morning' ? '早班' : '晚班';
        let resultMsg = `✅ 已將 ${targetDateStr} 設定 ${shiftLabel}：\n`;
        resultMsg += `成功配對 ${matched.length} 人：\n${matched.join('、')}\n`;
        if (unmatched.length > 0) {
          resultMsg += `\n⚠️ 無法配對 ${unmatched.length} 人（無可用點工人員）：${unmatched.join('、')}`;
        }
        setTextInputResult({ type: 'success', message: resultMsg });
      };

      // === 匯出 PDF (A4 橫向排版) ===
      const handleExportPDF = async () => {
        const el = document.getElementById('calendar-area');
        if (!el) { alert('找不到月曆區域'); return; }
        try {
          // 顯示處理中提示
          const loadingDiv = document.createElement('div');
          loadingDiv.id = 'pdf-loading';
          loadingDiv.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,0.5);display:flex;align-items:center;justify-content:center;z-index:9999';
          loadingDiv.innerHTML = '<div style="background:white;padding:24px 48px;border-radius:12px;font-size:18px;font-weight:bold;">PDF 產生中，請稍候...</div>';
          document.body.appendChild(loadingDiv);

          await new Promise(r => setTimeout(r, 100)); // 等待 UI 更新

          const canvas = await html2canvas(el, {
            scale: 2,
            useCORS: true,
            backgroundColor: '#ffffff',
            logging: false,
          });

          const { jsPDF } = window.jspdf;
          // A4 橫向: 297mm x 210mm
          const pdf = new jsPDF({ orientation: 'landscape', unit: 'mm', format: 'a4' });
          const pageW = 287; // 內容寬度 (297-左右邊距)
          const pageH = 200; // 內容高度 (210-上下邊距)

          const imgW = canvas.width;
          const imgH = canvas.height;
          const ratio = Math.min(pageW / imgW, pageH / imgH);
          const finalW = imgW * ratio;
          const finalH = imgH * ratio;
          const offsetX = (297 - finalW) / 2;
          const offsetY = (210 - finalH) / 2;

          const imgData = canvas.toDataURL('image/png');
          pdf.addImage(imgData, 'PNG', offsetX, offsetY, finalW, finalH);
          pdf.save(`排班表_${currentYear}年${currentMonth + 1}月.pdf`);

          document.getElementById('pdf-loading')?.remove();
        } catch (err) {
          console.error(err);
          document.getElementById('pdf-loading')?.remove();
          alert('PDF 匯出失敗，請確認網路連線以載入所需套件。');
        }
      };

      // 處理 Excel 匯入 (同時讀取「工班清單」和「狀態」兩張工作表)
      const handleExcelUpload = (e) => {
        const file = e.target.files[0];
        if (!file) return;

        const reader = new FileReader();
        reader.onload = (evt) => {
          try {
            const bstr = evt.target.result;
            const wb = XLSX.read(bstr, { type: 'binary' });

            // === 解析「工班清單」工作表 ===
            const workerSheetName = wb.SheetNames.find(n => n.includes('清單') || n.includes('工班')) || wb.SheetNames[0];
            const ws = wb.Sheets[workerSheetName];
            const data = XLSX.utils.sheet_to_json(ws, { header: 1 });

            const newWorkers = [];
            for (let i = 1; i < data.length; i++) {
              const row = data[i];
              if (!row || row.length === 0) continue;
              const idVal = row[0];
              const nameVal = row[1];
              const shortVal = row[2];
              let nameStr = (nameVal === undefined || nameVal === null || String(nameVal).trim() === '' || String(nameVal).trim() === '0') ? '0' : String(nameVal).trim();
              let shortStr = (shortVal === undefined || shortVal === null) ? String(idVal || '') : String(shortVal).trim();
              newWorkers.push({ id: idVal || i, name: nameStr, short: shortStr });
            }
            if (newWorkers.length > 0) {
              setWorkersList(newWorkers);
            }

            // === 解析「狀態」工作表 ===
            const statusSheetName = wb.SheetNames.find(n => n.includes('狀態'));
            if (statusSheetName) {
              const sws = wb.Sheets[statusSheetName];
              const sData = XLSX.utils.sheet_to_json(sws, { header: 1 });

              // 解析狀態，花形舊名對照表
              const colorNameMap = {
                '淺綠色': '#A9D18E', '深綠色': '#70AD47', '墨綠色': '#4D7731',
                '藍色': '#00B0F0', '灰色': '#BFBFBF', '白色': '#FFFFFF',
                '粉紅色': '#F4B8C1', '紫色': '#CC00FF', '紅色': '#FF0000',
                '黑色': '#333333', '橙色': '#FF8C00', '黃色': '#FFD700',
                '深藍色': '#002060',
              };
              // 過濾掉標題列
              const newStatuses = {};
              for (let i = 1; i < sData.length; i++) {
                const row = sData[i];
                if (!row || !row[0]) continue;
                const label = String(row[0]).trim();
                const colorLabel = row[1] ? String(row[1]).trim() : '綠色';
                const borderLabel = row[2] ? String(row[2]).trim() : '無';
                const borderColorLabel = row[3] ? String(row[3]).trim() : '無';

                const bg = colorNameMap[colorLabel] || '#A9D18E';
                let borderStyle = 'none';
                if (borderLabel === '實線') borderStyle = 'solid';
                else if (borderLabel === '虛線') borderStyle = 'dashed';
                let borderColor = 'transparent';
                if (borderColorLabel && borderColorLabel !== '無') {
                  borderColor = colorNameMap[borderColorLabel] || borderColorLabel;
                } else if (borderStyle === 'solid') {
                  borderColor = bg; // 預設同底色
                }

                // 自動決定文字顏色
                const darkBgs = ['#FFFFFF', '#BFBFBF', '#A9D18E', '#F4B8C1', '#FFD700'];
                const textColor = darkBgs.includes(bg) ? '#333333' : '#ffffff';

                const key = 'status_' + i;
                newStatuses[key] = { label, bg, borderStyle, borderColor, textColor };
              }
              if (Object.keys(newStatuses).length > 0) {
                // 將「未派」移到最前面作為預設狀態
                const reordered = {};
                const unassignKey = Object.keys(newStatuses).find(k => newStatuses[k].label === '未派');
                if (unassignKey) {
                  reordered[unassignKey] = newStatuses[unassignKey];
                }
                Object.keys(newStatuses).forEach(k => {
                  if (k !== unassignKey) reordered[k] = newStatuses[k];
                });
                setStatusTypes(reordered);
              }
            }

            alert('名單與狀態已成功從 Excel 匯入並更新！');
          } catch (error) {
            console.error(error);
            alert('解析 Excel 時發生錯誤。請確認網路連線以載入解析套件，或檢查檔案格式。');
          }
        };
        reader.readAsBinaryString(file);
      };

      // 處理任務清單 Excel 匯入
      const handleMissionExcelUpload = (e) => {
        const file = e.target.files[0];
        if (!file) return;

        const reader = new FileReader();
        reader.onload = (evt) => {
          try {
            const bstr = evt.target.result;
            const wb = XLSX.read(bstr, { type: 'binary' });
            const ws = wb.Sheets[wb.SheetNames[0]];
            const data = XLSX.utils.sheet_to_json(ws);

            if (data.length > 0) {
              setMissionConfig(data);
              alert(`成功匯入 ${data.length} 筆任務清單！`);
            } else {
              alert('未能在該檔案中找到任何有效資料。');
            }
          } catch (error) {
            console.error(error);
            alert('解析任務清單發生錯誤。');
          }
        };
        reader.readAsBinaryString(file);
        e.target.value = '';
      };

      // 處理派工單匯入 (260309整理後派工單.xlsx 格式)
      const handleWorkOrderUpload = (e) => {
        const file = e.target.files[0];
        if (!file) return;

        const reader = new FileReader();
        reader.onload = (evt) => {
          try {
            const bstr = evt.target.result;
            const wb = XLSX.read(bstr, { type: 'binary' });
            const ws = wb.Sheets[wb.SheetNames[0]];
            const data = XLSX.utils.sheet_to_json(ws, { raw: false, defval: '' }); // raw:false 保證時間等為字串

            if (data.length > 0) {
              const newTasks = { ...tasks };
              const newMaterials = { ...materials };
              const newUnfinished = [];
              const seenUnfinished = new Set();

              data.forEach(row => {
                const dateStrOriginal = String(row['日期'] || '').trim();
                const match = dateStrOriginal.match(/(\d+)月(\d+)日/);
                if (!match) return;

                const m = parseInt(match[1], 10) - 1;
                const d = parseInt(match[2], 10);
                const targetDate = formatDateString(currentYear, m, d);

                const shiftName = String(row['班別'] || '').trim();
                const shiftType = (shiftName === '夜班' || shiftName === '晚班') ? '晚班' : '早班';

                const time = String(row['上班時間'] || '').trim();
                const owner = String(row['業主'] || '').trim();
                const location = String(row['地點'] || '').trim();
                const remarks = String(row['用料/備註'] || '').trim();

                // 收集為待辦任務清單項目
                if (location) {
                  const uKey = location + "|||" + remarks;
                  if (!seenUnfinished.has(uKey)) {
                    seenUnfinished.add(uKey);
                    newUnfinished.push({ loc: location, remark: remarks });
                  }
                }

                // 新增任務 (地點對應確切地址/路段)
                if (location || owner || time) {
                  if (!newTasks[targetDate]) newTasks[targetDate] = [];
                  newTasks[targetDate].push({
                    owner: owner,
                    project: '',
                    city: '',
                    region: shiftType,
                    address: location,
                    remarks: time, // 把上班時間先寫進remarks
                    customOwner: true, customProject: true
                  });
                }

                // 新增使用料件 (用料對應)
                if (remarks) {
                  if (!newMaterials[targetDate]) newMaterials[targetDate] = [];
                  newMaterials[targetDate].push({
                    tool: remarks,
                    rawMaterial: '',
                    quantity: ''
                  });
                }
              });

              setTasks(newTasks);
              setMaterials(newMaterials);
              if (newUnfinished.length > 0) {
                setUnfinishedTasks(newUnfinished);
              }
              alert(`成功匯入派工單並轉換為排班項目！`);
            } else {
              alert('未能在該檔案中找到任何有效資料。');
            }
          } catch (error) {
            console.error(error);
            alert('解析派工單發生錯誤。請確認檔案格式是否為「整理後派工單」。');
          }
        };
        reader.readAsBinaryString(file);
        e.target.value = '';
      };

      // 產生空白格子
      const emptyCells = Array.from({ length: firstDayIndex }).map((_, i) => (
        <div key={`empty-${i}`} className="bg-gray-50/50 border border-gray-100 min-h-[120px] sm:min-h-[140px]"></div>

      const dayCells = Array.from({ length: daysInMonth }).map((_, i) => {
        const day = i + 1;
        const dateStr = formatDateString(currentYear, currentMonth, day);
        const dailyShifts = shifts[dateStr] || {};
        const holidayName = HOLIDAYS[dateStr];
        const lunarStr = getLunarDateStr(currentYear, currentMonth, day);

        const dayOfWeekIndex = (firstDayIndex + i) % 7;
        const isWeekend = dayOfWeekIndex === 5 || dayOfWeekIndex === 6;

        const cellDate = new Date(currentYear, currentMonth, day);
        const isToday = new Date().toDateString() === cellDate.toDateString();
        const todayStart = new Date();
        todayStart.setHours(0, 0, 0, 0);
        const isPast = cellDate < todayStart;

        // 計算出勤與未出勤統計
        const presentKeys = ['morning', 'evening', 'double', 'block'];
        const absentKeys = ['dayoff', 'unassign', 'personal', 'sick', 'awol', 'injury', 'funeral', 'paternity'];
        const activeWorkers = workersList.filter(w => w.name !== '0');
        const totalWorkers = activeWorkers.length;

        // 統計每位工人的狀態
        let presentCount = 0;
        let absentCount = 0;
        activeWorkers.forEach(w => {
          const st = dailyShifts[w.name] || Object.keys(statusTypes)[0];
          // 嘗試用 label 比對分類
          const info = statusTypes[st];
          const lbl = info ? info.label : '';
          const presentLabels = ['早班', '晚班', '連班', '擋班'];
          if (presentKeys.includes(st) || presentLabels.includes(lbl)) {
            presentCount++;
          } else {
            absentCount++;
          }
        });

        return (
          <div
            key={`day-${day}`}
            onClick={() => handleDayClick(day)}
            className={`relative p-1 border min-h-[100px] sm:min-h-[120px] flex flex-col cursor-pointer transition-all hover:border-blue-400 hover:shadow-md
          ${isWeekend || holidayName ? 'bg-red-50/30' : 'bg-white'} 
          ${isToday ? 'ring-2 ring-blue-500 ring-inset' : 'border-gray-200'}
        `}
          >
            {/* 頂部：日期、農曆與假日資訊 */}
            <div className="flex justify-between items-start mb-0.5">
              <span className={`flex items-center justify-center w-7 h-7 rounded-full text-base font-bold
            ${isToday ? 'bg-blue-600 text-white' : 'text-gray-800'}
            ${(isWeekend || holidayName) && !isToday ? 'text-red-600' : ''}

              </span>

                {holidayName ? (
                  <span className="text-red-600 font-bold bg-red-100 px-1.5 py-0.5 rounded shadow-sm">{holidayName}</span>

                  <span className="text-gray-400">{lunarStr}</span>
                )}
              </div>
            </div>

            {/* 出勤/未出勤統計已移至排班 Modal */}

            {/* 人員色彩矩陣 (Color Grid) - 隱藏空缺位 */}
            <div className="mt-auto pt-1 grid grid-cols-5 gap-[1px]">

                const statusKey = dailyShifts[workerName] || Object.keys(statusTypes)[0];
                const statusInfo = statusTypes[statusKey] || Object.values(statusTypes)[0];

                const cellStyle = {
                  backgroundColor: statusInfo.bg,
                  color: statusInfo.textColor,
                  borderWidth: statusInfo.borderStyle !== 'none' ? '2px' : '1px',

                  </div>
                );

            </div>

            {/* 任務與料件區塊 */}

                {tasks[dateStr] && tasks[dateStr].length > 0 && (

                <button onClick={() => { setShowTextInput(true); setTextInputResult(null); setTextInputValue(''); }} className="flex items-center gap-1 bg-amber-50 text-amber-700 border border-amber-200 hover:bg-amber-100 px-3 py-1.5 rounded-lg text-sm font-medium transition-colors">
                  <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M17 3a2.85 2.83 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5Z" /><path d="m15 5 4 4" /></svg>

            {/* 月曆主體 */}

              <div className="grid grid-cols-7 mb-1 gap-px sm:gap-[2px]">

          {/* 排班編輯 Modal (當選取日期時彈出) */}
          {selectedDateStr && (
            <div className="fixed inset-0 bg-slate-900/60 backdrop-blur-sm flex items-center justify-center p-4 z-50">
              <div className="bg-white rounded-2xl shadow-2xl w-full max-w-3xl flex flex-col max-h-[90vh] overflow-hidden animate-in fade-in zoom-in-95 duration-200">

                        <label className="block">
                          <span className="text-sm font-bold text-gray-700 mb-1 block">備註事項：</span>
                          <input type="text" className="w-full border border-gray-300 p-3 rounded-xl outline-none focus:ring-2 focus:ring-amber-500" placeholder="選填" value={wizardData.remarks} onChange={e => setWizardData({ ...wizardData, remarks: e.target.value })} />
                        </label>
                      </div>
                    </div>
                  )}
                </div>

                <div className="px-6 py-4 border-t border-gray-100 bg-gray-50 flex justify-end gap-3">
                  <button onClick={() => setShowTaskWizard(false)} className="px-5 py-2.5 bg-white border border-gray-300 text-gray-700 hover:bg-gray-50 font-medium rounded-xl transition-colors">
                    取消
                  </button>
                  {wizardStep === 4 && (
                    <button onClick={submitTaskWizard} className="px-5 py-2.5 bg-amber-600 hover:bg-amber-700 text-white font-bold rounded-xl shadow-sm transition-colors focus:ring-4 focus:ring-amber-500/20 flex items-center gap-1">
                      <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M20 6 9 17l-5-5" /></svg>
                      完成並加入
                    </button>
                  )}
                </div>
              </div>
            </div>
          )}

        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>

</html>
